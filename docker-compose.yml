version : '3.8'
services:
    web:
        build: .
        container_name: gyakorlas1_web
        restart: unless-stopped
        expose:
            - "3000"
        mem_limit: 200m

    nginx:
        image: nginx:alpine
        container_name: gyakorlas1_nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
          - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - web  
        mem_limit: 100m

    